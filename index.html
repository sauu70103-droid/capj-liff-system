<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錦葳店務與財務系統</title>
    
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* =========================================================
           品牌視覺風格
           ========================================================= */
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #2e1065 100%);
            color: #f8fafc;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
                radial-gradient(2px 2px at 150px 70px, #ffffff, transparent),
                radial-gradient(2px 2px at 50px 160px, #ffffff, transparent);
            background-size: 350px 350px;
            opacity: 0.3;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        h2 {
            text-align: center;
            color: #c4b5fd;
            text-shadow: 0 0 10px rgba(196, 181, 253, 0.3);
            letter-spacing: 2px;
        }

        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 10;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #2dd4bf;
            font-weight: bold;
        }

        /* =========================================================
           明細預覽專用視窗 (Modal)
           ========================================================= */
        #previewOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        #previewImage {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .preview-actions {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        /* =========================================================
           導覽頁籤與輸入欄位
           ========================================================= */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            text-align: center;
        }

        .tab-btn.active {
            background: rgba(139, 92, 246, 0.3);
            color: #ddd6fe;
            border-color: #8b5cf6;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
        }

        .form-section {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 12px;
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #f8fafc;
            font-size: 16px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        input[readonly] {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            cursor: not-allowed;
        }

        option {
            background: #1e1b4b;
            color: #ffffff;
        }

        /* =========================================================
           按鈕視覺設定
           ========================================================= */
        .btn-submit {
            background: linear-gradient(to right, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-cancel-action {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid #ef4444;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-search {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        /* =========================================================
           財務結帳模組專用 UI：中台候選人與行動端購物車
           ========================================================= */
        .pending-box {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid #8b5cf6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .pending-item {
            display: inline-block;
            background: #4c1d95;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #6d28d9;
            transition: 0.2s;
        }

        .pending-item:hover {
            background: #6d28d9;
        }

        .cart-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #4ade80;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .cart-title {
            font-weight: bold;
            color: #4ade80;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }

        .cart-item-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
            position: relative;
        }

        .cart-item-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .cart-item-row > div {
            flex: 1;
        }

        .cart-item-del {
            position: absolute;
            right: 10px;
            top: 10px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        /* =========================================================
           店務查詢 / 高階儀表板 UI
           ========================================================= */
        .result-card {
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid #8b5cf6;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
        }

        .result-info {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
            color: #e2e8f0;
        }

        .result-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-edit { background: #3b82f6; color: white; }
        .btn-del { background: #ef4444; color: white; }
        
        .reschedule-box {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            display: none;
        }

        #summaryDashboard {
            background: rgba(45, 212, 191, 0.1);
            border: 1px solid #2dd4bf;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .summary-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 6px;
        }

        .summary-val {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: #2dd4bf;
            margin-top: 5px;
        }

        /* =========================================================
           實體收據圖渲染區 (不破壞 LIFF 畫面，隱藏在螢幕外)
           ========================================================= */
        #receiptCaptureArea {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 450px;
            background: #ffffff;
            color: #1e293b;
            padding: 30px;
            font-family: sans-serif;
        }

        .receipt-header {
            text-align: center;
            border-bottom: 2px dashed #cbd5e1;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        
        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 30px 0;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loadingOverlay">系統連線驗證中...</div>
    
    <h2>錦葳店務與財務系統</h2>
    
    <div class="tabs">
        <button class="tab-btn active" id="btnTabBooking" onclick="switchTab('bookingTab', this)">店務預約</button>
        <button class="tab-btn hidden" id="btnTabFinance" onclick="switchTab('financeTab', this)">財務結帳</button>
        <button class="tab-btn hidden" id="btnTabAdjust" onclick="switchTab('adjustTab', this)">財務異動</button>
    </div>

    <div id="bookingTab" class="form-section active">
        <div class="form-group">
            <label>手機號碼</label>
            <input type="tel" id="bkPhone" placeholder="09xxxxxxxx">
        </div>
        <div class="form-group">
            <label>顧客姓名</label>
            <input type="text" id="bkName" placeholder="請輸入顧客姓名">
        </div>
        <div class="form-group">
            <label>人數</label>
            <input type="number" id="bkPeople" value="1" min="1">
        </div>
        <div class="form-group">
            <label>課程類型</label>
            <select id="bkCourse">
                <option value="無痛滑罐放鬆(快速修復)-30分鐘">無痛滑罐放鬆-30分鐘</option>
                <option value="全方位滑罐放鬆(全身修復)-90分鐘">全方位滑罐放鬆-90分鐘</option>
                <option value="單部位舒緩修復(精準調理)">單部位舒緩修復</option>
                <option value="全身結構養護(平衡調理)">全身結構養護</option>
                <option value="全身全方位深度修復-60分鐘">全身全方位深度修復-60分鐘</option>
                <option value="其他">其他</option>
            </select>
        </div>
        <div class="form-group">
            <label>指定調理師傅</label>
            <select id="bkHero">
                <option value="奎元">奎元</option>
                <option value="千芳">千芳</option>
            </select>
        </div>
        <div class="form-group">
            <label>開始時間</label>
            <input type="datetime-local" id="bkStart">
        </div>
        <div class="form-group">
            <label>結束時間</label>
            <input type="datetime-local" id="bkEnd">
        </div>
        <button class="btn-submit" onclick="submitBookingData()">確認建立預約排程</button>
        
        <div class="divider"></div>
        
        <h3 style="color: #cbd5e1; font-size: 16px;">🔍 查詢、改期與取消預約</h3>
        <div class="form-group">
            <input type="text" id="srchKw" placeholder="請輸入姓名或手機號碼">
        </div>
        <button class="btn-search" id="btnSearch" onclick="searchBks()">搜尋預約紀錄</button>
        <div id="srchArea"></div>
    </div>

    <div id="financeTab" class="form-section">
        <div id="summaryDashboard" class="hidden">
            <button class="btn-cancel-action" style="color: #2dd4bf; border-color: #2dd4bf;" onclick="fetchSum()">📊 載入高階營收數據</button>
            <div class="summary-grid hidden" id="sumData">
                <div class="summary-item">本日<span class="summary-val" id="vD">$0</span></div>
                <div class="summary-item">本週<span class="summary-val" id="vW">$0</span></div>
                <div class="summary-item">本月<span class="summary-val" id="vM">$0</span></div>
            </div>
        </div>
        
        <div class="pending-box">
            <button class="btn-search" style="background: #8b5cf6;" id="btnFetchPending" onclick="loadPend()">📥 載入中台待結帳清單</button>
            <div id="pendArea" style="margin-top: 15px;"></div>
        </div>
        
        <div class="cart-box">
            <div class="cart-title">
                <span>🛒 結帳核對卡片 (支援多選合併)</span>
                <span id="cSum">$0</span>
            </div>
            <div id="cBody">
                </div>
        </div>
        
        <div class="form-group">
            <label>支付方式</label>
            <select id="fPay" onchange="toggleRem()">
                <option value="現金">現金</option>
                <option value="匯款">匯款</option>
                <option value="扣堂">扣堂</option>
            </select>
        </div>
        
        <div class="form-group hidden" id="remBox">
            <label>匯款備註資料</label>
            <input type="text" id="fRem" placeholder="請輸入後五碼或匯款日期">
        </div>
        
        <div class="form-group">
            <label>結帳經手人</label>
            <input type="text" id="fCash" readonly>
        </div>
        
        <div class="form-group">
            <label>整體結帳備註 (會永久記錄於表單並呈現在明細上)</label>
            <textarea id="fGenNote" placeholder="例如：開發票統編、或是整批客人的特殊交代項目..." style="resize: vertical; height: 80px;"></textarea>
        </div>
        
        <button id="btnProcessCart" class="btn-submit" style="background: linear-gradient(to right, #10b981, #059669);" onclick="previewAndProcessCart()">產生電子明細預覽</button>
    </div>

    <div id="adjustTab" class="form-section">
        <h3 style="color: #fca5a5;">⚠️ 財務帳務異動修正 (作廢)</h3>
        <p style="font-size: 14px; color: #94a3b8;">調閱當月入帳流水明細，一鍵執行作廢退費歸零。</p>
        <div class="form-group">
            <input type="text" id="adjKw" placeholder="請輸入顧客姓名或手機">
        </div>
        <button class="btn-search" id="btnSearchFinance" style="border-color: #ef4444; color: #fca5a5;" onclick="searchFin()">查詢當月財務紀錄</button>
        <div id="adjArea"></div>
    </div>
</div>

<div id="previewOverlay">
    <h3 style="color: #4ade80; margin-top: 0;">請確認結帳明細無誤</h3>
    <img id="previewImage" src="" alt="明細預覽">
    <div class="preview-actions">
        <button class="btn-cancel-action" onclick="cancelCheckout()">返回修改</button>
        <button class="btn-submit" style="margin-top: 0; background: linear-gradient(to right, #10b981, #059669);" onclick="confirmCheckout()">確認下載並完成結帳</button>
    </div>
</div>

<div id="receiptCaptureArea">
    <div class="receipt-header">
        <h3 style="margin: 0;">錦葳養生館</h3>
        <p style="margin: 5px 0 0; color: #64748b;">電子結帳核對明細</p>
    </div>
    <div class="receipt-row">
        <span>單號：</span>
        <span id="rId"></span>
    </div>
    <div class="receipt-row">
        <span>時間：</span>
        <span id="rTm"></span>
    </div>
    <div class="receipt-row">
        <span>方式：</span>
        <span id="rMth"></span>
    </div>
    <div class="receipt-row">
        <span>人員：</span>
        <span id="rCsh"></span>
    </div>
    
    <div class="receipt-row" id="rRemRow" style="display: none; color: #10b981; font-weight: bold;">
        <span>匯款資料：</span>
        <span id="rRemNote"></span>
    </div>
    
    <div style="border-bottom: 1px dashed #cbd5e1; margin: 15px 0;"></div>
    
    <div id="rItems"></div>
    
    <div style="border-bottom: 2px solid #1e293b; margin: 15px 0;"></div>
    
    <div class="receipt-row" style="font-weight: bold; font-size: 18px;">
        <span>加總調理金額：</span>
        <span id="rSum"></span>
    </div>
    
    <div id="rGenNoteBox" style="display: none; font-size: 13px; color: #475569; margin-top: 15px; border-top: 1px dashed #cbd5e1; padding-top: 10px;">
        <strong>整體備註說明：</strong><br>
        <span id="rGenNote"></span>
    </div>
    
    <p style="text-align: center; font-size: 12px; margin-top: 25px; color: #94a3b8;">感謝您的光臨，期待再次為您服務。</p>
</div>

<script>
    // 專屬 API 通道
    const API = 'https://script.google.com/macros/s/AKfycbwvFhB4fX_h3W2BdHadQOXo1VJzUaEzmiO93kxoNlaOLBwJz0tblFWPABB9q18aDIS4/exec';
    
    const prices = {
        "無痛滑罐放鬆(快速修復)-30分鐘": 600, 
        "全方位滑罐放鬆(全身修復)-90分鐘": 1600, 
        "單部位舒緩修復(精準調理)": 600, 
        "全身結構養護(平衡調理)": 1000, 
        "全身全方位深度修復-60分鐘": 2000
    };
    
    let cart = [];
    let pendingCheckoutPayload = null; // 暫存結帳資料
    let pendingBase64 = null;          // 暫存圖片Base64
    
    const v = id => document.getElementById(id).value;
    const el = id => document.getElementById(id);

    // 1. LIFF 初始化與權限鎖控
    liff.init({ liffId: '2010453415-nTX3Lo1L' }).then(async () => {
        if (!liff.isLoggedIn()) {
            liff.login();
        } else {
            try {
                const profile = await liff.getProfile();
                el('fCash').value = profile.displayName;
                
                const response = await fetch(API, {
                    method: 'POST', 
                    body: JSON.stringify({ action: 'checkAuth', userName: profile.displayName })
                });
                
                const r = await response.json();
                
                el('loadingOverlay').style.display = 'none';
                
                if (r.status === 'success') {
                    if (r.permissions.canAccessFinance) {
                        el('btnTabFinance').classList.remove('hidden');
                        el('btnTabAdjust').classList.remove('hidden');
                    }
                    if (r.permissions.canViewSummary) {
                        el('summaryDashboard').classList.remove('hidden');
                    }
                }
            } catch(e) {
                el('loadingOverlay').innerText = '驗證連線失敗，請洽詢管理員。';
            }
        }
    });

    // 2. 頁籤切換控制
    function switchTab(id, btn) {
        document.querySelectorAll('.form-section').forEach(x => {
            x.style.display = 'none';
        });
        document.querySelectorAll('.tab-btn').forEach(x => {
            x.classList.remove('active');
        });
        el(id).style.display = 'block';
        btn.classList.add('active');
    }
    
    // 3. 匯款備註顯示控制
    function toggleRem() {
        if (v('fPay') === '匯款') {
            el('remBox').classList.remove('hidden');
        } else {
            el('remBox').classList.add('hidden');
        }
    }

    // 4. API 通訊打包元件
    async function apiCall(action, payload, msg) {
        try {
            const response = await fetch(API, {
                method: 'POST', 
                body: JSON.stringify({ 
                    action: action, 
                    ...payload, 
                    orderId: 'B' + Date.now() 
                })
            });
            const r = await response.json();
            
            if (r.status === 'success') {
                if (msg) {
                    alert(msg);
                }
                // 【修改要求：不再關閉視窗，讓行政人員持續使用】
                // 移除了 liff.closeWindow()
                return r;
            } else {
                alert('作業失敗：' + r.message);
            }
        } catch(e) {
            alert('網路連線異常，請稍後再試。');
        }
    }

    // 5. 店務預約核心：建立預約
    async function submitBookingData() {
        const payload = {
            phone: v('bkPhone'),
            customerName: v('bkName'),
            people: v('bkPeople'),
            courseType: v('bkCourse'),
            heroStaff: v('bkHero'),
            startTime: v('bkStart'),
            endTime: v('bkEnd')
        };
        await apiCall('createBooking', payload, '預約排程寫入成功！');
        // 自動清空輸入框，方便下一位顧客建立
        el('bkPhone').value = '';
        el('bkName').value = '';
        el('bkStart').value = '';
        el('bkEnd').value = '';
    }

    // 6. 店務預約核心：搜尋與修改
    async function searchBks() {
        const k = v('srchKw');
        if (!k) {
            return alert('請輸入姓名或手機號碼查詢');
        }
        
        const btn = el('btnSearch');
        btn.innerText = '搜尋中...';
        
        try {
            const r = await apiCall('searchBookings', { keyword: k });
            el('srchArea').innerHTML = '';
            
            if (r && r.data.length > 0) {
                r.data.forEach(i => {
                    const displayCourse = i.course.replace(/\(.*?\)/g, ''); 
                    
                    el('srchArea').innerHTML += `
                        <div class="result-card" id="bk-${i.orderId}">
                            <div class="result-info">
                                <strong>${i.name}</strong> - ${displayCourse}<br>
                                時間：${i.startTime} | 師傅：${i.hero}
                            </div>
                            <div class="result-actions">
                                <button class="btn-small btn-edit" onclick="toggleReschedule('${i.orderId}')">改期</button>
                                <button class="btn-small btn-del" onclick="if(confirm('確定要取消此預約排程嗎？')) apiCall('cancelBooking',{orderId:'${i.orderId}'}).then(()=>el('bk-${i.orderId}').style.display='none')">取消預約</button>
                            </div>
                            <div class="reschedule-box" id="rBx-${i.orderId}">
                                <label style="font-size:12px;">新開始時間</label>
                                <input type="datetime-local" id="ns-${i.orderId}" style="margin-bottom:8px;">
                                <label style="font-size:12px;">新結束時間</label>
                                <input type="datetime-local" id="ne-${i.orderId}">
                                <button class="btn-submit" onclick="submitReschedule('${i.orderId}')">儲存變更</button>
                            </div>
                        </div>`;
                });
            } else {
                el('srchArea').innerHTML = '<p style="text-align:center;color:#fca5a5;">查無目前生效的預約紀錄</p>';
            }
        } catch(e) {
            console.error(e);
        } finally {
            btn.innerText = '搜尋目前預約紀錄';
        }
    }

    function toggleReschedule(id) { 
        const box = el(`rBx-${id}`); 
        if (box.style.display === 'block') {
            box.style.display = 'none';
        } else {
            box.style.display = 'block';
        }
    }

    async function submitReschedule(id) {
        const start = v(`ns-${id}`);
        const end = v(`ne-${id}`);
        
        if (!start || !end) {
            return alert('請完整選擇新的時間');
        }
        
        const r = await apiCall('rescheduleBooking', { 
            orderId: id, 
            newStartTime: start, 
            newEndTime: end 
        });
        
        if (r && r.status === 'success') { 
            alert('改期完成'); 
            searchBks(); 
        }
    }

    // 7. 財務結帳：加載中台名單
    async function loadPend() {
        const btn = el('btnFetchPending');
        if (btn) {
            btn.innerText = '讀取中...';
        }
        
        try {
            const r = await apiCall('fetchPendingCheckouts', {});
            el('pendArea').innerHTML = '';
            
            if (r && r.data.length > 0) {
                r.data.forEach(i => {
                    const d = document.createElement('div');
                    d.className = 'pending-item';
                    
                    const displayCourse = (i.course || '未定').replace(/\(.*?\)/g, '');
                    const dateLabel = i.dateStr ? ` [${i.dateStr}]` : '';
                    
                    d.innerText = `+ ${i.name}${dateLabel} [${displayCourse}]`;
                    
                    d.onclick = () => {
                        cart.push({
                            id: 'i' + Date.now() + Math.random().toString(36).substr(2,3),
                            name: i.name,
                            phone: i.phone,
                            course: i.course || '無痛滑罐放鬆(快速修復)-30分鐘',
                            hero: i.hero || '千芳',
                            price: prices[i.course] || 600,
                            note: ''
                        });
                        renderCart();
                    };
                    
                    el('pendArea').appendChild(d);
                });
            } else {
                el('pendArea').innerText = '目前中台沒有待結帳的顧客。';
            }
        } catch(e) {
            console.error(e);
        } finally {
            if (btn) {
                btn.innerText = '📥 載入中台待結帳清單';
            }
        }
    }

    // 8. 財務結帳：購物車卡片化渲染
    function renderCart() {
        el('cBody').innerHTML = '';
        let totalSum = 0;
        
        window.uc = (id, field, val) => {
            const item = cart.find(x => x.id === id);
            if (item) {
                item[field] = val;
                if (field === 'course') {
                    item.price = prices[val] || 0;
                }
                renderCart();
            }
        };
        
        cart.forEach(i => {
            totalSum += Number(i.price);
            const c = i.course;
            
            el('cBody').innerHTML += `
            <div class="cart-item-card">
                <button class="cart-item-del" onclick="cart=cart.filter(x=>x.id!=='${i.id}');renderCart()">✕</button>
                <div class="cart-item-row" style="padding-right: 35px;">
                    <div>
                        <label style="font-size:12px;margin-bottom:2px;">顧客姓名</label>
                        <input value="${i.name}" onchange="uc('${i.id}','name',this.value)" style="padding:6px;font-size:14px;">
                    </div>
                    <div>
                        <label style="font-size:12px;margin-bottom:2px;">調理師傅</label>
                        <select onchange="uc('${i.id}','hero',this.value)" style="padding:6px;font-size:14px;">
                            <option value="千芳" ${i.hero === '千芳' ? 'selected' : ''}>千芳</option>
                            <option value="奎元" ${i.hero === '奎元' ? 'selected' : ''}>奎元</option>
                        </select>
                    </div>
                </div>
                <div class="cart-item-row">
                    <div style="flex:2;">
                        <label style="font-size:12px;margin-bottom:2px;">調理項目</label>
                        <select onchange="uc('${i.id}','course',this.value)" style="padding:6px;font-size:14px;">
                            <option value="無痛滑罐放鬆(快速修復)-30分鐘" ${c.includes('無痛') ? 'selected' : ''}>無痛滑罐放鬆-30分鐘</option>
                            <option value="全方位滑罐放鬆(全身修復)-90分鐘" ${c.includes('全方位') ? 'selected' : ''}>全方位滑罐放鬆-90分鐘</option>
                            <option value="單部位舒緩修復(精準調理)" ${c.includes('單部位') ? 'selected' : ''}>單部位舒緩修復</option>
                            <option value="全身結構養護(平衡調理)" ${c.includes('結構') || c.includes('平衡') ? 'selected' : ''}>全身結構養護</option>
                            <option value="全身全方位深度修復-60分鐘" ${c.includes('深度') ? 'selected' : ''}>全身全方位深度修復-60分鐘</option>
                            <option value="其他" ${c === '其他' ? 'selected' : ''}>其他</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;margin-bottom:2px;">實收金額</label>
                        <input type="number" value="${i.price}" onchange="uc('${i.id}','price',this.value)" style="padding:6px;font-size:14px;">
                    </div>
                </div>
                <div>
                    <input value="${i.note}" placeholder="調理細節個別備註 (選填)..." onchange="uc('${i.id}','note',this.value)" style="padding:6px;font-size:13px;background:rgba(0,0,0,0.1);">
                </div>
            </div>`;
        });
        
        el('cSum').innerText = '$' + totalSum;
    }

    // 9. 財務結帳：預覽畫面與準備資料
    function previewAndProcessCart() {
        if (cart.length === 0) {
            return alert('結帳核對清單內無資料！');
        }
        
        const btn = el('btnProcessCart');
        btn.innerText = '明細生成中...';
        
        const fid = 'F' + Date.now();
        el('rId').innerText = fid;
        el('rTm').innerText = new Date().toLocaleString();
        el('rMth').innerText = v('fPay');
        el('rCsh').innerText = v('fCash');
        
        const remVal = v('fRem');
        if (v('fPay') === '匯款' && remVal) {
            el('rRemRow').style.display = 'flex';
            el('rRemNote').innerText = remVal;
        } else {
            el('rRemRow').style.display = 'none';
        }
        
        const genNote = v('fGenNote');
        if (genNote) {
            el('rGenNoteBox').style.display = 'block';
            el('rGenNote').innerText = genNote;
        } else {
            el('rGenNoteBox').style.display = 'none';
        }

        el('rItems').innerHTML = '';
        let grandTotal = 0;
        
        cart.forEach(i => {
            grandTotal += Number(i.price);
            const displayCourse = i.course.replace(/\(.*?\)/g, '');
            
            el('rItems').innerHTML += `
                <div class="receipt-row" style="font-weight:bold;margin-top:8px;">
                    <span>${i.name} (${i.hero})</span>
                    <span>$${i.price}</span>
                </div>
                <div style="font-size:13px;color:#475569;padding-left:10px;margin-bottom:4px;">
                    項目：${displayCourse} ${i.note ? ' / 備註：' + i.note : ''}
                </div>`;
        });
        
        el('rSum').innerText = '$' + grandTotal;
        
        // 呼叫 html2canvas 生成預覽圖片
        html2canvas(el('receiptCaptureArea'), { scale: 2 }).then(canvas => {
            pendingBase64 = canvas.toDataURL('image/png');
            
            pendingCheckoutPayload = {
                action: 'createFinance', // 確保加上 action 供 API 使用
                orderId: fid,
                paymentMethod: v('fPay'),
                remittanceNote: remVal,
                cashier: v('fCash'),
                startTime: new Date().toISOString(),
                cartItems: cart,
                generalNote: genNote,
                receiptImageBase64: pendingBase64
            };
            
            // 顯示預覽畫面
            el('previewImage').src = pendingBase64;
            el('previewOverlay').style.display = 'flex';
            
            btn.innerText = '產生電子明細預覽';
        });
    }

    // 10. 財務結帳：取消預覽 (返回修改)
    function cancelCheckout() {
        el('previewOverlay').style.display = 'none';
        pendingCheckoutPayload = null;
        pendingBase64 = null;
    }

    // 11. 財務結帳：確認結帳並下載明細 (保留在系統不關閉)
    async function confirmCheckout() {
        if (!pendingCheckoutPayload) return;
        
        // 執行下載
        const a = document.createElement('a');
        a.href = pendingBase64;
        a.download = `錦葳結帳明細_${pendingCheckoutPayload.orderId}.png`;
        a.click();
        
        // 隱藏預覽畫面
        el('previewOverlay').style.display = 'none';
        
        // 送出資料至後端 GAS
        try {
            const response = await fetch(API, {
                method: 'POST', 
                body: JSON.stringify(pendingCheckoutPayload)
            });
            const r = await response.json();
            
            if (r.status === 'success') {
                alert('款項結帳成功！電子核對明細已自動儲存至雲端與本機。');
                
                // 清空購物車與表單
                cart = [];
                renderCart();
                el('fGenNote').value = '';
                el('fRem').value = '';
                
                // 清理暫存資料
                pendingCheckoutPayload = null;
                pendingBase64 = null;
                
                // 重點：不再呼叫 liff.closeWindow()，讓畫面留在結帳頁準備迎接下一位客人
                
            } else {
                alert('結帳存檔失敗：' + r.message);
            }
        } catch(e) {
            alert('結帳時發生網路錯誤，請確認網路連線。');
        }
    }

    // 12. 財務摘要儀表板
    async function fetchSum() {
        el('sumData').classList.remove('hidden');
        const r = await apiCall('getSummary', {});
        if (r && r.status === 'success') {
            el('vD').innerText = '$' + r.summary.daily;
            el('vW').innerText = '$' + r.summary.weekly;
            el('vM').innerText = '$' + r.summary.monthly;
        }
    }
    
    // 13. 財務異動紀錄查詢與作廢
    async function searchFin() {
        const k = v('adjKw');
        if (!k) {
            return alert('請輸入客戶姓名或手機查詢');
        }
        
        const btn = el('btnSearchFinance');
        btn.innerText = '調閱中...';
        
        try {
            const r = await apiCall('searchFinanceRecords', { keyword: k });
            el('adjArea').innerHTML = '';
            
            if (r && r.data.length > 0) {
                r.data.forEach(i => {
                    const displayCourse = i.course.replace(/\(.*?\)/g, '');
                    
                    el('adjArea').innerHTML += `
                        <div class="result-card" style="border-left-color:#ef4444;" id="f-${i.rowIndex}">
                            <strong>單號：${i.orderId}</strong> (${i.date})<br>
                            客戶：${i.name} | 金額：<span style="color:#f43f5e;font-weight:bold;">$${i.amount}</span> (${i.method})<br>
                            項目：${displayCourse}<br>
                            備註：<span style="color:#94a3b8;">${i.note || '無'}</span><br>
                            <button class="btn-small btn-del" style="background:#dc2626;margin-top:10px;" onclick="if(confirm('確定要將此款項執行作廢歸零嗎？')) apiCall('voidFinanceRecord',{rowIndex:${i.rowIndex},orderId:'${i.orderId}'}).then(()=>el('f-${i.rowIndex}').style.opacity=0.3)">執行財務作廢歸零</button>
                        </div>`;
                });
            } else {
                el('adjArea').innerHTML = '<p style="text-align:center;color:#fca5a5;">當月查無此筆入帳財務紀錄</p>';
            }
        } catch(e) {
            console.error(e);
        } finally {
            btn.innerText = '查詢當月財務紀錄';
        }
    }
</script>
</body>
</html>
